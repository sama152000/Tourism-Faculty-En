<section class="faculty-section" *ngIf="newsData">
  <div class="faculty-container">
    <!-- Header Section -->
    <div class="text-center mb-5">
      <h1 class="faculty-title">{{ newsData.title }}</h1>
      <p class="faculty-text">{{ newsData.subtitle }}</p>
    </div>

    <!-- Filter Section: Button, Custom Dropdown, Search -->
    <div class="news-filter-section" *ngIf="newsData.sections.length">
      <!-- All News Button -->
      <button 
        class="btn btn-primary all-news-btn" 
        [class.active]="selectedDropdownCategory === 'All'"
        (click)="showAllNews()"
      >
        <i class="pi pi-list"></i>
        All News
      </button>

      <!-- Custom Category Dropdown (Native HTML/CSS) -->
      <div class="custom-dropdown" [class.open]="isDropdownOpen">
        <button 
          class="dropdown-trigger" 
          (click)="toggleDropdown()"
          type="button"
        >
          <span class="dropdown-label">{{ selectedDropdownCategory }}</span>
          <i class="pi pi-chevron-down dropdown-arrow"></i>
        </button>
        
        <ul class="dropdown-menu" *ngIf="isDropdownOpen">
          <li 
            class="dropdown-item"
            [class.active]="selectedDropdownCategory === 'All'"
            (click)="selectCategory('All')"
          >
            All Categories
          </li>
          <li 
            *ngFor="let cat of categories"
            class="dropdown-item"
            [class.active]="selectedDropdownCategory === cat.name"
            (click)="selectCategory(cat.name)"
          >
            {{ cat.name }}
          </li>
        </ul>
      </div>

      <!-- Search Bar -->
      <div class="search-bar">
        <input 
          type="text" 
          [(ngModel)]="searchQuery" 
          (input)="onSearchInput()"
          (keyup.enter)="onSearch()"
          placeholder="Search in news..."
          class="form-control"
        >
        <button class="search-btn" (click)="onSearch()">
          <i class="pi pi-search"></i>
        </button>
      </div>
    </div>

    <!-- Content Grid -->
    <div class="content-grid" *ngIf="paginatedPosts.length">
      <div class="content-card" *ngFor="let item of paginatedPosts">
        <div class="content-image-container">
          <img [src]="item.featuredImagePath" [alt]="item.title" class="content-image">
          <div class="content-category-badge">
            {{ getPostCategories(item) }}
          </div>
        </div>
        <div class="content-card-body">
          <div class="content-meta">
            <span class="content-date">
              <i class="pi pi-calendar"></i>
              {{ formatDate(item.createdDate) }}
            </span>
          </div>
          <h3 class="content-title">{{ item.title }}</h3>
          <div class="content-excerpt quill-content description"
            [innerHTML]="(item.content | cleanHtml) | slice:0:150"> 
          </div>
          <div class="content-card-footer">
            <a [routerLink]="['/news', item.slug]" class="faculty-btn faculty-btn-primary">
              Read More
              <i class="pi pi-arrow-left"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="paginatedPosts.length === 0" class="empty-state">
      <div class="empty-state-icon">
        <i class="pi pi-search"></i>
      </div>
      <h3 class="empty-state-title">No Content</h3>
      <p class="empty-state-text">
        No items match your search or selected category.
      </p>
    </div>
    
    <!-- Pagination -->
    <div class="pagination-container" *ngIf="totalPages > 1">
      <button 
        class="pagination-btn pagination-prev"
        [disabled]="currentPage === 1"
        (click)="prevPage()"
      >
        <i class="pi pi-chevron-right"></i>
        Previous
      </button>
      
      <div class="pagination-pages">
        <button 
          *ngFor="let page of pages"
          class="pagination-page"
          [class.active]="page === currentPage"
          (click)="goToPage(page)"
        >
          {{ page }}
        </button>
      </div>
      
      <button 
        class="pagination-btn pagination-next"
        [disabled]="currentPage === totalPages"
        (click)="nextPage()"
      >
        Next
        <i class="pi pi-chevron-left"></i>
      </button>
    </div>
    
  </div>
</section>
