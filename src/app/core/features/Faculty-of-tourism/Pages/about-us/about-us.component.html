<section class="faculty-section">
  <div class="faculty-container">
    <!-- Header Section -->
    <div class="text-center mb-5" *ngIf="aboutData">
      <h1 class="faculty-title">{{ aboutData.title }}</h1>
      <p class="faculty-text">{{ aboutData.subtitle }}</p>
    </div>

    <!-- Tabs Content -->
    <div class="about-tabs-container" *ngIf="aboutData.sections.length">
      <div class="custom-tabs">
        <!-- Tab Headers -->
        <div class="tab-headers">
          <a
            *ngFor="let section of aboutData.sections"
            class="tab-button"
            [class.active]="selectedTab === section.slug"
            [routerLink]="['/about', section.slug]"
          >
            {{ section.title }}
          </a>
        </div>

        <!-- Tab Content -->
        <div class="tab-content">
          <div
            *ngFor="let section of aboutData.sections"
            class="tab-panel"
            [class.active]="selectedTab === section.slug"
          >
            <div class="tab-content-wrapper">
              <div class="row align-items-center" *ngIf="section.id !== 'dean-word' || !section.image">
                <!-- Content Column -->
                <div class="col-lg-12 col-md-12">
                  <div class="content-section">
                    <h2 class="section-title">{{ section.title }}</h2>

                    <div *ngIf="section.image" class="dean-image text-center mb-3">
                      <img [src]="section.image" alt="Dean Image" class="img-fluid rounded shadow">
                    </div>

                    <!-- Goals Section - Render as list -->
                    <div *ngIf="section.id === 'goals' && section.content" class="goals-list">
                      <ul class="goals-ul">
                        <li *ngFor="let goal of getGoalsList(section.content)" class="goal-item">
                          {{ goal }}
                        </li>
                      </ul>
                    </div>

                    <!-- ✅ عرض Vision, Mission, History باستخدام innerHTML + cleanHtml -->
                    <div *ngIf="section.id !== 'goals'" class="content-text quill-content description"
                         [innerHTML]="section.content | cleanHtml">
                    </div>

                    <div *ngIf="section.additionalInfo" class="additional-info">
                      <div class="info-card">
                        <i class="pi pi-info-circle info-icon"></i>
                        <p class="faculty-text-light">{{ section.additionalInfo }}</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Two Column Layout for Dean Word -->
              <div class="row align-items-center" *ngIf="section.id === 'dean-word' && section.image">
                <!-- Content Column -->
                <div class="col-lg-6 col-md-12">
                  <div class="content-section">
                    <h2 class="section-title">{{ section.title }}</h2>
                    <!-- ✅ عرض كلمة العميد باستخدام innerHTML + cleanHtml -->
                    <div class="content-text quill-content description"
                         [innerHTML]="section.content | cleanHtml">
                    </div>
                    <div *ngIf="section.additionalInfo" class="additional-info">
                      <div class="info-card">
                        <i class="pi pi-info-circle info-icon"></i>
                        <p class="faculty-text-light">{{ section.additionalInfo }}</p>
                      </div>
                    </div>
                  </div>
                </div>
                <!-- Image Column -->
                <div class="col-lg-6 col-md-12">
                  <div class="dean-image text-center">
                    <img [src]="section.image" alt="Dean Image" class="dean-img rounded shadow">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
